AWSTemplateFormatVersion: "2010-09-09"
Description: >
  Static hosting for the Perigon board at a custom (Medesto) domain.
  S3 (private) + CloudFront (OAC, TLS) + ACM cert + Route 53 alias.
  DEPLOY THIS STACK IN us-east-1 (CloudFront certs must live there).

Parameters:
  DomainName:
    Type: String
    Default: dashboard.medesto.io
    Description: The full hostname to serve the board on.
  HostedZoneId:
    Type: AWS::Route53::HostedZone::Id
    Description: >
      Route 53 hosted-zone ID for medesto.io. (Only works if the domain's
      DNS is in Route 53 in THIS account. If it's at another provider, see the
      runbook note for the manual-DNS path.)

Resources:
  SiteBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "perigon-board-${AWS::AccountId}"
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault: { SSEAlgorithm: AES256 }
      VersioningConfiguration: { Status: Enabled }

  Cert:
    Type: AWS::CertificateManager::Certificate
    Properties:
      DomainName: !Ref DomainName
      ValidationMethod: DNS
      DomainValidationOptions:
        - DomainName: !Ref DomainName
          HostedZoneId: !Ref HostedZoneId   # auto-creates the DNS validation record

  OAC:
    Type: AWS::CloudFront::OriginAccessControl
    Properties:
      OriginAccessControlConfig:
        Name: !Sub "${AWS::StackName}-oac"
        OriginAccessControlOriginType: s3
        SigningBehavior: always
        SigningProtocol: sigv4

  Distribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Aliases: [!Ref DomainName]
        Enabled: true
        DefaultRootObject: index.html
        HttpVersion: http2and3
        ViewerCertificate:
          AcmCertificateArn: !Ref Cert
          SslSupportMethod: sni-only
          MinimumProtocolVersion: TLSv1.2_2021
        Origins:
          - Id: s3
            DomainName: !GetAtt SiteBucket.RegionalDomainName
            OriginAccessControlId: !Ref OAC
            S3OriginConfig: { OriginAccessIdentity: "" }
        DefaultCacheBehavior:
          TargetOriginId: s3
          ViewerProtocolPolicy: redirect-to-https
          Compress: true
          CachePolicyId: 658327ea-f89d-4fab-a63d-7e88639e58f6   # AWS managed CachingOptimized
        CustomErrorResponses:
          - ErrorCode: 403
            ResponseCode: 200
            ResponsePagePath: /index.html

  BucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref SiteBucket
      PolicyDocument:
        Statement:
          - Effect: Allow
            Principal: { Service: cloudfront.amazonaws.com }
            Action: s3:GetObject
            Resource: !Sub "${SiteBucket.Arn}/*"
            Condition:
              StringEquals:
                AWS:SourceArn: !Sub "arn:aws:cloudfront::${AWS::AccountId}:distribution/${Distribution.Id}"

  DnsRecord:
    Type: AWS::Route53::RecordSet
    Properties:
      HostedZoneId: !Ref HostedZoneId
      Name: !Ref DomainName
      Type: A
      AliasTarget:
        DNSName: !GetAtt Distribution.DomainName
        HostedZoneId: Z2FDTNDATAQYW2   # fixed CloudFront alias zone id

Outputs:
  URL:
    Value: !Sub "https://${DomainName}"
  Bucket:
    Value: !Ref SiteBucket
  DistributionId:
    Value: !Ref Distribution
  CloudFrontDomain:
    Description: Point the domain here manually if DNS is NOT in Route 53.
    Value: !GetAtt Distribution.DomainName
